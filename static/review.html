<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Staging - Papers App</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b px-6 py-4 mb-8">
        <h1 class="text-xl font-bold text-slate-800">Staging Review Queue</h1>
    </nav>

    <main class="max-w-5xl mx-auto px-4">

        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <div class="flex items-center space-x-2">
                <label for="case-match-filter" class="text-sm font-medium text-slate-600">Case Matching:</label>
                <select id="case-match-filter" onchange="filterReviewQueue()"
                    class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <option value="all">All Cases</option>
                    <option value="matched">Matched (Existing Case Found)</option>
                    <option value="unmatched">Unmatched (Event Input Review)</option>
                </select>
            </div>

        </div>
        <div class="flex justify-between items-center mb-4">

            <div class="flex space-x-2">
                <button onclick="loadReviewSuggestions('pending')" id="btn-pending"
                    class="bg-indigo-600 text-white px-4 py-2 rounded">Active Queue</button>
                <button onclick="loadReviewSuggestions('approved')" id="btn-approved"
                    class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Approved Records</button>
                <button onclick="loadReviewSuggestions('rejected')" id="btn-rejected"
                    class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Archived Records</button>
            </div>

            <a href="/"
                class="flex items-center px-4 py-2 text-sm font-medium text-white bg-slate-600 rounded-lg hover:bg-slate-700 transition-colors shadow-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18">
                    </path>
                </svg>
                Back to Dashboard
            </a>
        </div>

        <div id="review-container" class="space-y-4">
            <div class="text-center py-12 text-gray-500">Loading suggestions...</div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadReviewSuggestions);
    </script>
</body>

</html>
