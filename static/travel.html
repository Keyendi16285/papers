<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MassFOIA Papers - Travel Logistics Matrix</title>
    <!-- Tailwind and FontAwesome Assets -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 sm:text-3xl">In-Person Travel Docket</h1>
                <p class="text-sm text-slate-500 mt-1">Isolating tracking timelines containing on-site, in-person
                    appearances.</p>
            </div>
        </div>

        <!-- Filter Action Toolbar (Matches Dashboard UI exactly) -->
        <div
            class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm mb-6 flex flex-wrap items-center justify-between gap-4">
            <!-- Left Side Search Layout -->
            <div class="relative w-full max-w-md">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="travel-search-input"
                    class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all placeholder:text-slate-400"
                    placeholder="Search targets, defendants, case blocks...">
            </div>

            <!-- Right Side Switch Layout Buttons -->
            <div class="bg-slate-100 p-1 rounded-lg flex items-center gap-1">
                <button id="btn-group-default" onclick="setTravelGroupingMode('default')"
                    class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all bg-white text-slate-900 shadow-sm">
                    Standard List
                </button>
                <button id="btn-group-case" onclick="setTravelGroupingMode('case')"
                    class="px-3.5 py-1.5 rounded-md text-xs font-semibold text-slate-600 hover:text-slate-900 transition-all">
                    Group By Case
                </button>
                <button id="btn-group-defendant" onclick="setTravelGroupingMode('defendant')"
                    class="px-3.5 py-1.5 rounded-md text-xs font-semibold text-slate-600 hover:text-slate-900 transition-all">
                    Group By Defendant
                </button>
            </div>
        </div>

        <!-- Table Display Canvas Layout -->
        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-slate-50 border-b border-slate-100 text-[11px] font-bold uppercase tracking-wider text-slate-400">
                            <th class="px-6 py-4">Filing Nature</th>
                            <th class="px-6 py-4">Case Profile Context</th>
                            <th class="px-6 py-4 text-center">Party Side</th>
                            <th class="px-6 py-4">Target In-Person Date</th>
                            <th class="px-6 py-4 text-center">Events Block</th>
                            <th class="px-6 py-4 text-center">Links</th>
                            <th class="px-6 py-4 text-right">Action Space</th>
                        </tr>
                    </thead>
                    <tbody id="travel-docket-body" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-slate-400 text-sm">
                                <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Syncing travel itineraries...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Point to our main shared JavaScript controller logic script file asset -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/travel.js"></script>
</body>

</html>
